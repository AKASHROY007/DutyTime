name: Build Android APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Dependencies
        run: npm install --force

      - name: Build Web Project
        run: |
          npm run build || true
          if [ ! -d "dist" ]; then
            mkdir -p dist
            cp index.html dist/ 2>/dev/null || true
          fi

      - name: Setup Capacitor
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/android
          if [ ! -f "capacitor.config.json" ]; then
            npx cap init "DutyTime" "com.ec.aoo" --web-dir dist
          fi
          npx cap add android || true
          npx cap sync android

      - name: Build Android APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug
          # এখানে আমরা ফাইলের নাম পরিবর্তন করে দিচ্ছি
          mv app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/debug/DutyTime.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: DutyTime-App-Final
          # এখানে পরিবর্তিত ফাইলের পাথ দেওয়া হয়েছে
          path: android/app/build/outputs/apk/debug/DutyTime.apk
